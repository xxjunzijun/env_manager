name: Build Windows App

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure environment
        run: |
          chcp 65001
          echo "PYTHONIOENCODING=utf-8" >> $env:GITHUB_ENV
          echo "PYTHONUTF8=1" >> $env:GITHUB_ENV

      - name: Setup Node.js 24 (optional)
        if: false
        run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $env:GITHUB_ENV
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flet
        timeout-minutes: 30
      
      - name: Build Windows application
        env:
          FLET_AUTO_INSTALL_FLUTTER: 1  # 自动安装 Flutter
          FLET_NO_PROMPT: 1            # 禁用所有提示
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: 1
        run: |
          chcp 65001
          flet build windows --output dist --yes
        timeout-minutes: 60
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: env_manager-windows-x64
          path: dist/
          retention-days: 30
